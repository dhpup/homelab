defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0

controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/linuxserver/ombi
          tag: v4.53.5-ls251
          pullPolicy: IfNotPresent
        env:
          TZ: America/Toronto
          PUID: "0"
          PGID: "0"

service:
  main:
    controller: main
    ports:
      http:
        port: 3579

ingress:
  main:
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: mkcert
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: ombi.homelab.local
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: ombi.homelab.local
        hosts:
          - ombi.homelab.local

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 5Gi
    globalMounts:
      - path: /config