deployment:
  kind: DaemonSet

ingressClass:
  enabled: true
  isDefaultClass: true

service:
  annotations:
    metallb.universe.tf/loadBalancerIPs: "172.19.0.0"
  spec:
    externalTrafficPolicy: Local

ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

providers:
  kubernetesIngress:
    publishedService:
      enabled: true
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
