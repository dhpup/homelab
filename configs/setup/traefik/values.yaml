deployment:
  kind: DaemonSet

ingressClass:
  enabled: true
  isDefaultClass: true

service:
  annotations:
    metallb.universe.tf/address-pool: bgp-pool
  spec:
    loadBalancerIP: "172.19.0.0"
    externalTrafficPolicy: Local

ports:
  web:
    redirectTo:
      port: websecure

providers:
  kubernetesIngress:
    publishedService:
      enabled: true
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
