apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
  - secretKey: admin-user
    remoteRef:
      key: grafana_user
  - secretKey: admin-password
    remoteRef:
      key: grafana_password
