# Grafana Alloy as a DaemonSet log collector (the maintained successor to
# Promtail). Discovers every pod via the K8s API, reads container logs, and
# pushes them to Loki. Uses loki.source.kubernetes so no host log mounts are
# needed — the chart's default RBAC grants pods + pods/log read access.
controller:
  type: daemonset

alloy:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    # Generous ceiling: on startup loki.source.kubernetes replays each pod's
    # retained log history all at once, which briefly spikes memory well above
    # steady state. 128Mi OOMKilled it on this cluster; 512Mi rides out the burst.
    limits:
      memory: 512Mi
  configMap:
    content: |-
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }
