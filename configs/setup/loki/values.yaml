# Single-binary Loki for a homelab: one process, filesystem storage, no object
# store, no caches. Keeps the footprint to ~one pod + a small gateway.
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 336h  # 14 days
    # Accept backfilled logs up to the full retention window. Default is 168h (7d),
    # which makes Loki 400-reject the historical entries Alloy replays on startup.
    reject_old_samples: true
    reject_old_samples_max_age: 336h
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
  # Quiet the "structured metadata requires schema v13" style warnings; v13 above
  # already satisfies it. Nothing else to set here.

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# Distributed-mode components — keep them off in SingleBinary mode.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# The chart defaults the chunk cache to a memcached pod requesting ~9Gi. Disable
# both caches — unnecessary at homelab log volumes and a huge memory saver.
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# nginx gateway that fronts Loki (this is the datasource URL Grafana/Alloy use).
gateway:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# Trim optional extras that each add a pod.
lokiCanary:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
test:
  enabled: false
