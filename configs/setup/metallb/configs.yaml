apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: bgp-pool
spec:
  addresses:
  # Explicit range: excludes the 172.19.0.0 network address (previously a
  # full /16 that traefik was pinned to). These IPs are in-cluster only —
  # not routable from macOS; host access goes via the k3d serverlb.
  - 172.19.0.1-172.19.0.50

---

apiVersion: metallb.io/v1beta1
kind: BGPAdvertisement
metadata:
  name: bgp-advertisement
spec:
  ipAddressPools:
  - bgp-pool
  aggregationLength: 32 # advertise each route as a /32

---

apiVersion: metallb.io/v1beta2
kind: BGPPeer
metadata:
  name: tnsr-peer
spec:
  myASN: 64512
  peerASN: 64512
  peerAddress: 192.168.1.1
