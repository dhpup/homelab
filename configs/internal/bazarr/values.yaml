defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0

controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/bazarr
          tag: v1.5.6-ls344
          pullPolicy: IfNotPresent
        env:
          PUID: "0"
          PGID: "0"
          TZ: America/Toronto

service:
  main:
    controller: main
    ports:
      http:
        port: 6767

ingress:
  main:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: mkcert
    hosts:
      - host: bazarr.homelab.local
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: bazarr.homelab.local
        hosts:
          - bazarr.homelab.local

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 50Gi
    retain: true
    globalMounts:
      - path: /config
