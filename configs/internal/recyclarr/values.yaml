defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0

controllers:
  main:
    type: cronjob
    cronjob:
      schedule: "0 4 1 * *"
      concurrencyPolicy: Forbid
      successfulJobsHistory: 3
      failedJobsHistory: 3
    containers:
      main:
        image:
          repository: ghcr.io/recyclarr/recyclarr
          # Pinned to 7.x: Recyclarr 8.x defaults the config-templates provider
          # to the repo's `v8` branch, whose includes registry is currently
          # empty (breaks every `include: template:`). 7.x clones templates
          # from `master`, where the registry is populated, with no override.
          tag: "7.5.2"
          pullPolicy: IfNotPresent
        command: ["recyclarr", "sync"]
        env:
          TZ: America/Toronto
        envFrom:
          - secretRef:
              name: recyclarr-secret

persistence:
  # /config must be writable — recyclarr clones the trash-guides repo there each run
  config:
    type: emptyDir
    globalMounts:
      - path: /config
  # mount only the config file, read-only, via subPath so it doesn't shadow /config
  recyclarr-config:
    type: configMap
    name: recyclarr-config
    globalMounts:
      - path: /config/recyclarr.yml
        subPath: recyclarr.yml
