apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: doplarr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: external
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://github.com/dhpup/homelab.git
    targetRevision: main
    path: configs/external/doplarr
  destination:
    name: in-cluster
    namespace: doplarr
