apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: setup
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  sources:
  - chart: sealed-secrets
    # Chart moved from bitnami-labs to the bitnami org on 2026-06-15;
    # GitHub Pages URLs don't redirect, the old URL 404s.
    repoURL: https://bitnami.github.io/sealed-secrets
    targetRevision: 2.18.6
    helm:
      releaseName: sealed-secrets-controller
      valueFiles:
      - $values/configs/setup/sealed-secrets/values.yaml
  - repoURL: https://github.com/dhpup/homelab.git
    targetRevision: main
    ref: values
  destination:
    name: in-cluster
    namespace: kube-system
