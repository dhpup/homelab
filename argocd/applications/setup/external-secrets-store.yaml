apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-store
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: setup
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 20
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  source:
    repoURL: https://github.com/dhpup/homelab.git
    targetRevision: main
    path: configs/setup/external-secrets/infisical
  destination:
    name: in-cluster
    namespace: external-secrets
