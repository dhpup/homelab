apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: setup
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  sources:
  - repoURL: https://github.com/dhpup/homelab.git
    targetRevision: main
    path: configs/setup/argocd
  destination:
    name: in-cluster
    namespace: argocd
