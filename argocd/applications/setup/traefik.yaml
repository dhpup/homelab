apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: setup
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
  - chart: traefik
    repoURL: https://traefik.github.io/charts
    targetRevision: 39.0.8
    helm:
      releaseName: traefik
      valueFiles:
      - $values/configs/setup/traefik/values.yaml
  - repoURL: https://github.com/dhpup/homelab.git
    targetRevision: main
    ref: values
  destination:
    name: in-cluster
    namespace: traefik
