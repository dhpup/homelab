apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: unpackerr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: internal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
  - chart: app-template
    repoURL: https://bjw-s-labs.github.io/helm-charts
    targetRevision: 5.0.1
    helm:
      valueFiles:
      - $values/configs/internal/unpackerr/values.yaml
  - repoURL: https://github.com/dhpup/homelab.git
    targetRevision: main
    ref: values
  - repoURL: https://github.com/dhpup/homelab.git
    targetRevision: main
    path: configs/internal/unpackerr
  destination:
    name: in-cluster
    namespace: unpackerr
