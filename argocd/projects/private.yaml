apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: private
  namespace: argocd
spec:
  sourceRepos:
  - '*'
  destinations:
  - namespace: '*'
    server: '*'
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  orphanedResources:
    warn: false
  roles:
  - name: private-argo-test
    policies:
      # List applications in this project
      - p, proj:private:private-argo-test, applications, get, private/*, allow

      # Allow syncing applications in this project
      - p, proj:private:private-argo-test, applications, sync, private/*, allow

      # Allow deleting resources in applications in this project
      - p, proj:private:private-argo-test, applications, delete, private/*, allow

      # Allow restarting deployment resources in applications in this project
      - p, proj:private:private-argo-test, applications, action/apps/Deployment/restart, private/*, allow

      # Allow access to web terminal in applications in this project
      - p, proj:private:private-argo-test, exec, create, private/*, allow
    groups:
      - ArgoCD-Test
